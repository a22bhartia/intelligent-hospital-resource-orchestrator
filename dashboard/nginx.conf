server {
  listen 80;
  server_name _;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /api/allocation/ {
    proxy_pass http://allocation-service:8000/;
  }

  location /api/logger/ {
    proxy_pass http://logger-service:8000/;
  }

  location /api/capacity/ {
    proxy_pass http://capacity-service:8000/;
  }

  location /api/load-shedding/ {
    proxy_pass http://load-shedding-service:8000/;
  }

  location /api/event-analyzer/ {
    proxy_pass http://event-analyzer-service:8000/;
  }
}
